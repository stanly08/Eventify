{% extends "base.html" %}
{% block content %}
    <h2 class="text-center my-4" style="color: #6C757D;">Create New Event</h2>
    <div class="row justify-content-center">
        <div class="col-md-6">
            <form action="{{ url_for('create_event') }}" method="POST" enctype="multipart/form-data" style="border: 1px solid #ddd; padding: 20px; border-radius: 10px; background-color: #fff;">
                <div class="form-group mb-3">
                    <label for="name" style="font-weight: bold;">Event Name</label>
                    <input type="text" class="form-control" id="name" name="name" required style="padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
                </div>
                <div class="form-group mb-3">
                    <label for="description" style="font-weight: bold;">Description</label>
                    <textarea class="form-control" id="description" name="description" rows="4" required style="padding: 10px; border-radius: 5px; border: 1px solid #ccc;"></textarea>
                </div>
                <div class="form-group mb-3">
                    <label for="date" style="font-weight: bold;">Event Date</label>
                    <input type="date" class="form-control" id="date" name="date" required style="padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
                </div>
                <div class="form-group mb-3">
                    <label for="photo" style="font-weight: bold;">Event Photo</label>
                    <input type="file" class="form-control" id="photo" name="photo" accept="image/*" required style="padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
                </div>
                <button type="submit" class="btn w-100" style="background-color: #28A745; color: #fff; padding: 10px; font-size: 18px;"
                    onmouseover="this.style.backgroundColor='#218838'"
                    onmouseout="this.style.backgroundColor='#28A745'">
                    Create Event
                </button>
            </form>
        </div>
    </div>

    <!-- Display the uploaded photo with styles -->
    {% if photo_url %}
    <div class="text-center mt-4">
        <h4 style="color: #6C757D;">Uploaded Event Photo:</h4>
        <img src="{{ photo_url }}" alt="Event Photo" style="max-width: 100%; border-radius: 10px; transition: transform 0.3s;"
             onmouseover="this.style.transform='rotate(5deg)';" 
             onmouseout="this.style.transform='rotate(0deg)';">
    </div>
    {% endif %}
{% endblock %}
