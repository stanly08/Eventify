{% extends "base.html" %}
{% block content %}
    <h2 class="text-center my-4" style="color: #6C757D;">Sign Up</h2>
    <div class="row justify-content-center">
        <div class="col-md-6">
            <form action="{{ url_for('signup') }}" method="POST" style="border: 1px solid #ddd; padding: 20px; border-radius: 10px; background-color: #fff;">
                <div class="form-group mb-3">
                    <label for="username" style="font-weight: bold;">Username</label>
                    <input type="text" class="form-control" id="username" name="username" required style="padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
                </div>
                <div class="form-group mb-3">
                    <label for="email" style="font-weight: bold;">Email</label>
                    <input type="email" class="form-control" id="email" name="email" required style="padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
                </div>
                <div class="form-group mb-3">
                    <label for="password" style="font-weight: bold;">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required style="padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
                </div>
                <div class="form-group mb-3">
                    <label for="role" style="font-weight: bold;">Role</label>
                    <select class="form-control" id="role" name="role" required style="padding: 10px; border-radius: 5px; border: 1px solid #ccc;">
                        <option value="user">User</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <button type="submit" class="btn w-100" style="background-color: #28A745; color: #fff; padding: 10px; font-size: 18px;"
                    onmouseover="this.style.backgroundColor='#218838'"
                    onmouseout="this.style.backgroundColor='#28A745'">
                    Sign Up
                </button>
            </form>
        </div>
    </div>
{% endblock %}
